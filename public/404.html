<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page not found</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Courier New', Courier, monospace;
        font-size: 1rem;
        line-height: 1.6;
        color: #1a1a1a;
        background: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .wrap { text-align: center; padding: 2rem; }
      .code { font-size: 5rem; line-height: 1; font-weight: 700; margin-bottom: 1rem; }
      .message { margin-bottom: 2rem; color: #6b7280; }
      a { color: #1a1a1a; }
      a:hover { text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p class="code">404</p>
      <p class="message">Page not found.</p>
      <a href="/">← Back to home</a>
    </div>
  </body>
</html>
